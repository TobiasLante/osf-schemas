# i3x-it-fleet — IT-Edge Inventory entry
edgeId: it-qms
sourceId: it-qms
tenant: demo
customer: customer-x
deployTarget: i3x-v3
displayName: QMS - Quality Records
description: Schema-driven Postgres poller against qmsdb (quality_record).
dbConnection:
  type: postgresql
  hostEnv: QMS_DB_HOST
  portEnv: QMS_DB_PORT
  userEnv: QMS_DB_USER
  passwordSecret: it-suite-secrets/QMS_DB_PASSWORD
  dbNameEnv: QMS_DB_NAME
pollIntervalMs: 30000
enabled: true
image:
  repository: 192.168.178.150:32000/i3x-v3/it-edge-base
  tag: "0.1.1"
resources:
  requests: { cpu: "50m", memory: "96Mi" }
  limits:   { cpu: "500m", memory: "256Mi" }
notes: "Single-table demo seed."
