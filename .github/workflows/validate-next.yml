# Validation for the SDC-inspired augmentation staging tree under next/.
# Runs ONLY on changes touching next/** — never blocks PRs that modify only
# canonical paths (profiles/, sources/, sync/, validation/).
#
# Profile standard: ONE unified meta-schema (next/validation/profile-schema.json)
# keyed on the now-REQUIRED 'category' (machine|equipment|business). The former
# machine-/equipment-/business-profile-schema.json are kept as thin SHIMS (same
# $id) that $ref the unified schema + pin the category — so consumers loading by
# filename keep working. intelligence/ keeps its own canonical schema (out of scope).
#
# Jobs:
#   1. schema-compile     — ajv compile of every next/validation/*.json
#   2. profile-validate   — ajv validate each next/profiles/machines/*.json
#                           against next/validation/machine-profile-schema.json
#                           (the shim -> unified profile-schema.json -> constraint-schema.json)
#                           + equipment/ + erp|qms|wms/ via their shims
#                           + next/profiles/*.json top-level fixtures (skeleton
#                           template) against the unified schema directly
#                           + each next/profiles/intelligence/*.json against the
#                           CANONICAL validation/intelligence-profile-schema.json
#                           (no facet added there — only the discrepancy_class
#                           enum VALUE 'constraint', which is profile data)
#   3. source-sync-validate — ajv validate each next/sources/** against
#                           next/validation/source-schema.json and each
#                           next/sync/** against next/validation/sync-schema.json
#                           (AC-1: cover sources/sync, not just profiles). Both
#                           meta-schemas are permissive — coverage, not new
#                           constraints — so existing files never false-fail.
#   4. lint-constraints   — cross-reference linter (next/ci/lint-constraints.mjs):
#                           predicate.attr resolves to a real attribute (via
#                           parentType inheritance); predicate.value type matches
#                           attribute.dataType; enum membership checked.
#                           + category<->folder linter (next/ci/lint-category.mjs):
#                           machines/->machine, equipment/->equipment,
#                           erp|qms|wms/->business (intelligence/ + top-level
#                           fixtures skipped).
#                           + delivery guardrail (next/ci/lint-delivery.mjs, FR-D2):
#                           WARNS (never fails) on telemetry-on-setpoint and
#                           transactional-fed-by-best-effort-poll smells.
#
#   5. build-shacl        — JSON -> SHACL transpiler (next/ci/json-to-shacl.mjs):
#                           tests (n3 parse check) + emits next/build/shacl/*.ttl
#                           as a CI artifact (Option C: JSON is SSOT, SHACL is a
#                           build artifact — never hand-edited, never committed)

name: validate-next

on:
  push:
    branches: [main]
    paths:
      - 'next/**'
      - '.github/workflows/validate-next.yml'
  pull_request:
    branches: [main]
    paths:
      - 'next/**'
      - '.github/workflows/validate-next.yml'
  workflow_dispatch:

jobs:
  schema-compile:
    name: ajv compile (next/validation/*.json)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv
        run: npm i ajv@8

      - name: Compile next/validation/*.json
        run: |
          set -e
          shopt -s nullglob
          schemas=(next/validation/*.json)
          if [ ${#schemas[@]} -eq 0 ]; then
            echo "No schemas yet — scaffold-only PR. Skipping."
            exit 0
          fi
          for s in "${schemas[@]}"; do
            echo "Compiling $s"
            node -e "
              const Ajv = require('ajv');
              const fs = require('fs');
              const path = require('path');
              const ajv = new Ajv({
                strict: false,
                loadSchema: async (uri) => JSON.parse(fs.readFileSync(
                  path.join('next/validation', uri.split('/').pop()), 'utf8'))
              });
              const schema = JSON.parse(fs.readFileSync('$s', 'utf8'));
              ajv.compileAsync(schema)
                .then(() => console.log('  OK'))
                .catch(e => { console.error('  FAIL:', e.message); process.exit(1); });
            "
          done

  profile-validate:
    name: ajv validate (next/profiles/machines/*.json)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: schema-compile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv
        run: npm i ajv@8

      - name: Validate machine profiles
        run: |
          set -e
          shopt -s nullglob
          profiles=(next/profiles/machines/*.json)
          if [ ${#profiles[@]} -eq 0 ]; then
            echo "No machine profiles yet — scaffold-only stage."
            exit 0
          fi
          node -e "
            const Ajv = require('ajv');
            const fs = require('fs');
            const path = require('path');
            const ajv = new Ajv({
              strict: false,
              loadSchema: async (uri) => JSON.parse(fs.readFileSync(
                path.join('next/validation', uri.split('/').pop()), 'utf8'))
            });
            const machineSchema = JSON.parse(fs.readFileSync(
              'next/validation/machine-profile-schema.json', 'utf8'));
            const constraintSchema = JSON.parse(fs.readFileSync(
              'next/validation/constraint-schema.json', 'utf8'));
            const profileSchema = JSON.parse(fs.readFileSync(
              'next/validation/profile-schema.json', 'utf8'));
            ajv.addSchema(constraintSchema, 'constraint-schema.json');
            // The category shims now \$ref the unified profile-schema.json; register it
            // so the sync compile() resolves the ref.
            ajv.addSchema(profileSchema, 'profile-schema.json');
            const validate = ajv.compile(machineSchema);
            const files = process.argv.slice(1);
            let fail = 0;
            for (const f of files) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              const ok = validate(j);
              if (ok) console.log('  OK  ' + f);
              else {
                fail++;
                console.error('  FAIL ' + f);
                for (const e of validate.errors) console.error('       ' + e.instancePath + ' ' + e.message);
              }
            }
            process.exit(fail ? 1 : 0);
          " ${profiles[@]}

      - name: Validate intelligence profiles
        run: |
          set -e
          shopt -s nullglob
          profiles=(next/profiles/intelligence/*.json)
          if [ ${#profiles[@]} -eq 0 ]; then
            echo "No intelligence profiles yet."
            exit 0
          fi
          node -e "
            const Ajv = require('ajv');
            const fs = require('fs');
            const ajv = new Ajv({ strict: false });
            const schema = JSON.parse(fs.readFileSync(
              'validation/intelligence-profile-schema.json', 'utf8'));
            const validate = ajv.compile(schema);
            const files = process.argv.slice(1);
            let fail = 0;
            for (const f of files) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              const ok = validate(j);
              if (ok) console.log('  OK  ' + f);
              else {
                fail++;
                console.error('  FAIL ' + f);
                for (const e of validate.errors) console.error('       ' + e.instancePath + ' ' + e.message);
              }
            }
            process.exit(fail ? 1 : 0);
          " ${profiles[@]}

      - name: Validate business profiles (erp + qms + wms)
        run: |
          set -e
          shopt -s nullglob
          profiles=(next/profiles/erp/*.json next/profiles/qms/*.json next/profiles/wms/*.json)
          if [ ${#profiles[@]} -eq 0 ]; then
            echo "No business profiles yet."
            exit 0
          fi
          node -e "
            const Ajv = require('ajv');
            const fs = require('fs');
            const ajv = new Ajv({ strict: false });
            const schema = JSON.parse(fs.readFileSync(
              'next/validation/business-profile-schema.json', 'utf8'));
            const constraintSchema = JSON.parse(fs.readFileSync(
              'next/validation/constraint-schema.json', 'utf8'));
            const profileSchema = JSON.parse(fs.readFileSync(
              'next/validation/profile-schema.json', 'utf8'));
            ajv.addSchema(constraintSchema, 'constraint-schema.json');
            // The category shims now \$ref the unified profile-schema.json.
            ajv.addSchema(profileSchema, 'profile-schema.json');
            const validate = ajv.compile(schema);
            const files = process.argv.slice(1);
            let fail = 0;
            for (const f of files) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              const ok = validate(j);
              if (ok) console.log('  OK  ' + f);
              else {
                fail++;
                console.error('  FAIL ' + f);
                for (const e of validate.errors) console.error('       ' + e.instancePath + ' ' + e.message);
              }
            }
            process.exit(fail ? 1 : 0);
          " ${profiles[@]}

      - name: Validate equipment profiles
        run: |
          set -e
          shopt -s nullglob
          profiles=(next/profiles/equipment/*.json)
          if [ ${#profiles[@]} -eq 0 ]; then
            echo "No equipment profiles yet."
            exit 0
          fi
          node -e "
            const Ajv = require('ajv');
            const fs = require('fs');
            const ajv = new Ajv({ strict: false });
            const schema = JSON.parse(fs.readFileSync(
              'next/validation/equipment-profile-schema.json', 'utf8'));
            const constraintSchema = JSON.parse(fs.readFileSync(
              'next/validation/constraint-schema.json', 'utf8'));
            const profileSchema = JSON.parse(fs.readFileSync(
              'next/validation/profile-schema.json', 'utf8'));
            ajv.addSchema(constraintSchema, 'constraint-schema.json');
            // The category shims now \$ref the unified profile-schema.json.
            ajv.addSchema(profileSchema, 'profile-schema.json');
            const validate = ajv.compile(schema);
            const files = process.argv.slice(1);
            let fail = 0;
            for (const f of files) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              const ok = validate(j);
              if (ok) console.log('  OK  ' + f);
              else {
                fail++;
                console.error('  FAIL ' + f);
                for (const e of validate.errors) console.error('       ' + e.instancePath + ' ' + e.message);
              }
            }
            process.exit(fail ? 1 : 0);
          " ${profiles[@]}

      - name: Validate top-level fixtures (skeleton template, unified schema directly)
        run: |
          set -e
          shopt -s nullglob
          profiles=(next/profiles/*.json)
          if [ ${#profiles[@]} -eq 0 ]; then
            echo "No top-level fixtures (e.g. _skeleton.template.json) — none to validate."
            exit 0
          fi
          node -e "
            const Ajv = require('ajv');
            const fs = require('fs');
            const ajv = new Ajv({ strict: false });
            const constraintSchema = JSON.parse(fs.readFileSync(
              'next/validation/constraint-schema.json', 'utf8'));
            ajv.addSchema(constraintSchema, 'constraint-schema.json');
            // Skeleton fixtures are category-agnostic copy-templates — validate
            // against the unified meta-schema directly (no category const-pin shim).
            const profileSchema = JSON.parse(fs.readFileSync(
              'next/validation/profile-schema.json', 'utf8'));
            const validate = ajv.compile(profileSchema);
            const files = process.argv.slice(1);
            let fail = 0;
            for (const f of files) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              const ok = validate(j);
              if (ok) console.log('  OK  ' + f);
              else {
                fail++;
                console.error('  FAIL ' + f);
                for (const e of validate.errors) console.error('       ' + e.instancePath + ' ' + e.message);
              }
            }
            process.exit(fail ? 1 : 0);
          " ${profiles[@]}

  source-sync-validate:
    name: ajv validate (next/sources/** + next/sync/**)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: schema-compile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv
        run: npm i ajv@8

      - name: Validate sources (next/sources/**)
        run: |
          set -e
          shopt -s nullglob globstar
          files=(next/sources/**/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No source descriptors yet — scaffold-only stage."
            exit 0
          fi
          node -e "
            const Ajv = require('ajv');
            const fs = require('fs');
            const ajv = new Ajv({ strict: false, allErrors: true });
            const validate = ajv.compile(JSON.parse(fs.readFileSync(
              'next/validation/source-schema.json', 'utf8')));
            const files = process.argv.slice(1);
            let fail = 0;
            for (const f of files) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              const ok = validate(j);
              if (ok) console.log('  OK  ' + f);
              else {
                fail++;
                console.error('  FAIL ' + f);
                for (const e of validate.errors) console.error('       ' + e.instancePath + ' ' + e.message);
              }
            }
            process.exit(fail ? 1 : 0);
          " ${files[@]}

      - name: Validate sync (next/sync/**)
        run: |
          set -e
          shopt -s nullglob globstar
          files=(next/sync/**/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No sync descriptors under next/sync/ yet — schema in place for when they land (coverage ready)."
            exit 0
          fi
          node -e "
            const Ajv = require('ajv');
            const fs = require('fs');
            const ajv = new Ajv({ strict: false, allErrors: true });
            const validate = ajv.compile(JSON.parse(fs.readFileSync(
              'next/validation/sync-schema.json', 'utf8')));
            const files = process.argv.slice(1);
            let fail = 0;
            for (const f of files) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              const ok = validate(j);
              if (ok) console.log('  OK  ' + f);
              else {
                fail++;
                console.error('  FAIL ' + f);
                for (const e of validate.errors) console.error('       ' + e.instancePath + ' ' + e.message);
              }
            }
            process.exit(fail ? 1 : 0);
          " ${files[@]}

      - name: Validate recipes (next/recipes/**)
        run: |
          set -e
          shopt -s nullglob globstar
          files=(next/recipes/**/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No recipe master-data under next/recipes/ yet — schema in place for when they land (coverage ready)."
            exit 0
          fi
          node -e "
            const Ajv = require('ajv');
            const fs = require('fs');
            const ajv = new Ajv({ strict: false, allErrors: true });
            const validate = ajv.compile(JSON.parse(fs.readFileSync(
              'next/validation/recipe-schema.json', 'utf8')));
            const files = process.argv.slice(1);
            let fail = 0;
            for (const f of files) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              const ok = validate(j);
              if (ok) console.log('  OK  ' + f);
              else {
                fail++;
                console.error('  FAIL ' + f);
                for (const e of validate.errors) console.error('       ' + e.instancePath + ' ' + e.message);
              }
            }
            process.exit(fail ? 1 : 0);
          " ${files[@]}

  lint-constraints:
    name: cross-reference + delivery linters (next/ci/*.mjs)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: profile-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run cross-reference linter
        run: node next/ci/lint-constraints.mjs

      - name: Run category<->folder linter
        run: node next/ci/lint-category.mjs

      - name: Run cross-constraint linter
        run: node next/ci/lint-cross-constraints.mjs

      - name: Run delivery guardrail linter (FR-D2, warnings only)
        run: node next/ci/lint-delivery.mjs

      - name: Run recipe linter (next/recipes/ master data)
        run: node next/ci/lint-recipes.mjs

  build-shacl:
    name: JSON -> SHACL transpiler (next/ci/json-to-shacl.mjs)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint-constraints

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install n3 (Turtle parse check in tests)
        run: npm i n3@1

      - name: Run transpiler tests
        run: node next/ci/test-json-to-shacl.mjs

      - name: Emit SHACL build artifacts
        run: node next/ci/json-to-shacl.mjs

      - name: Upload next/build/shacl
        uses: actions/upload-artifact@v4
        with:
          name: shacl
          path: next/build/shacl/*.ttl
          if-no-files-found: warn
