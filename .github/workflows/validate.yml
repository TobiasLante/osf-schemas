# osf-schemas validation pipeline — GitHub-hosted runner.
#
# Two layers, both must pass:
#   1. npm run validate          — the ci/lint-*.mjs linter chain (see
#      package.json; category, constraints, recipes, delivery, cross, refs,
#      edges, mtconnect, aliases, contract drift, docs drift, vocabulary +
#      self-test, counters, kpis + self-test), incl.
#      lint-refs.mjs (cross-file referential integrity: every profileRef/
#      sourceRef resolves, every mapped smAttribute exists in the referenced
#      profile, dataTypes agree across the three type vocabularies) and
#      gen-docs.mjs --check (README/schema-guide generated blocks must match
#      a fresh render of the tree + contract.json).
#   2. validate-all.mjs          — per-file ajv shape validation of
#      profiles/, sources/, sync/, recipes/ against validation/*.json.
#
# On PRs additionally: breaking-change diff vs the base branch.
#
# History: until 2026-07-08 this ran on the self-hosted .120 runner and was
# FAKE-GREEN — `node … | tee` masked an ERR_MODULE_NOT_FOUND crash because
# the pipeline exit code was tee's. `shell: bash` (which implies -o pipefail)
# and `npm ci` fix both root causes. The .120 runner is no longer used here.
name: validate

on:
  push:
    branches: [main, v3]
  pull_request:
    branches: [main, v3]
  workflow_dispatch:

defaults:
  run:
    # Explicit `bash` runs with `-e -o pipefail` (implicit default is -e only)
    shell: bash

jobs:
  validate:
    name: linters + ajv shape validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # breaking-change diff needs base-branch history

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (ajv toolchain)
        run: npm ci --no-audit --no-fund

      - name: Linter self-test — a broken literal MUST turn the build red
        # Runs ci/lint-vocabulary.mjs as a subprocess against fixture trees and
        # asserts on the EXIT CODE. This repo has shipped fake-green checks
        # twice (a `tee` that ate an ajv crash; lint-recipes.mjs that never
        # loaded the schema it claimed to enforce) — an untested gate is not a
        # gate. `npm run validate` runs this too; it is called out separately so
        # a failure here is unmistakable in the run log.
        run: npm run test:vocabulary

      - name: Referential-integrity + convention linters (ci/lint-*.mjs)
        run: npm run validate

      - name: Shape validation (validation/*.json meta-schemas)
        run: node .github/scripts/validate-all.mjs | tee validation-report.txt

      - name: Detect breaking schema changes vs base branch
        if: github.event_name == 'pull_request'
        run: |
          node .github/scripts/breaking-change-check.mjs \
            --base "origin/${{ github.base_ref }}" \
            --head "HEAD" | tee breaking-change-report.txt

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_id }}
          path: |
            validation-report.txt
            breaking-change-report.txt
          if-no-files-found: ignore
          retention-days: 30
